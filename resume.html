<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Aditya Gupta</title>
  <meta name="description" content="Resume of Aditya Gupta — Computer Science freshman at Purdue University." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <!-- Apply the saved theme BEFORE paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem("theme");
        var t = s || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>

  <!-- ===================== NAVIGATION ===================== -->
  <header class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Aditya<span>.</span></a>

      <ul class="nav__links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="resume.html">Resume</a></li>
      </ul>

      <div style="display:flex; gap:.5rem; align-items:center;">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button id="navBurger" class="nav__burger" aria-label="Open menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>


  <main>

    <!-- ===================== RESUME ===================== -->
    <section>
      <div class="container">
        <span class="section-label reveal">Resume</span>
        <h1 class="reveal">My resume.</h1>

        <p class="lead reveal">
          A quick snapshot of my coursework, projects, and skills.
          You can preview it below, or download a PDF copy if you’d
          prefer to read it offline.
        </p>

        <!-- EDIT: update the href below if you rename the PDF.
             Make sure the file sits in assets/Resume.pdf -->
        <div class="resume-actions reveal">
          <a href="assets/Resume.pdf" download class="btn btn--primary">
            ⬇ Download PDF
          </a>
          <a href="assets/Resume.pdf" target="_blank" rel="noopener" class="btn btn--ghost">
            Open in new tab
          </a>
        </div>

        <!-- Embedded PDF preview.
             Some mobile browsers can't render PDFs inline — the
             download button above guarantees people can still get it. -->
        <div class="reveal">
          <object
            class="pdf-frame"
            data="assets/Resume.pdf"
            type="application/pdf"
            aria-label="Embedded resume PDF">
            <p style="padding: 2rem; text-align:center;">
              It looks like your browser can’t display PDFs inline.
              <a href="assets/Resume.pdf" download>Download the resume</a>
              instead.
            </p>
          </object>
        </div>

      </div>
    </section>

  </main>


  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <div class="container">
      <p>© <span id="year"></span> Aditya Gupta · Built with HTML, CSS & JavaScript.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
